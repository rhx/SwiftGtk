name: Linux (monorepo)

# Dependencies of this package
env:
  UBUNTU_APT: ${{ 'libgtk-3-dev gir1.2-gtk-3.0 gir1.2-gtksource-3.0 libcogl-pango-dev libcogl-path-dev libcogl-dev libpango1.0-dev gir1.2-pango-1.0 libgdk-pixbuf2.0-dev gir1.2-gdkpixbuf-2.0 libgraphene-1.0-dev gir1.2-graphene-1.0 libglib2.0-dev glib-networking gobject-introspection libgirepository1.0-dev libxml2-dev jq xvfb' }}

on:
  push:
    branches: [monorepo-development, monorepo]
  pull_request:
    branches: [monorepo-development, monorepo]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: ${{ matrix.os }} (Swift ${{ matrix.swift }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            swift: "6.1"
          - os: ubuntu-22.04
            swift: "6.1"
          - os: ubuntu-22.04
            swift: "5.10.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: SwiftGtk

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}

      - name: Swift version
        run: swift --version

      - name: Fetch Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $UBUNTU_APT

      - name: Build
        run: cd SwiftGtk && swift build
